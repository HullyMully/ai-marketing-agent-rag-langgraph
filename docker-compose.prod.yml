# AI Customer Assistant - production-oriented stack.
# Usage:
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up --build -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-assistant}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-assistant}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8

  qdrant:
    image: qdrant/qdrant:v1.9.1
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 8

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env.production
    environment:
      MOCK_LLM: "${MOCK_LLM:-false}"
      USE_MOCK_EMBEDDINGS: "${USE_MOCK_EMBEDDINGS:-false}"
      DATABASE_URL: "${DATABASE_URL}"
      QDRANT_URL: "http://qdrant:6333"
      API_BASE_URL: "${API_BASE_URL:-http://localhost:8000}"
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      bash -c "python scripts/ingest_knowledge.py &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000
               --proxy-headers --workers $${WEB_CONCURRENCY:-2}"

  bot:
    build: .
    profiles: ["bot"]
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      API_BASE_URL: "${API_BASE_URL}"
    depends_on:
      app:
        condition: service_started
    command: ["python", "-m", "bot.main"]

volumes:
  postgres_data:
  qdrant_storage:
