# AI Customer Assistant – local stack.
# Usage:
#   docker compose up --build            # app + qdrant
#   docker compose --profile bot up      # also start the Telegram bot
services:
  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Demo mode: no API keys required.
      MOCK_LLM: "true"
      USE_MOCK_EMBEDDINGS: "true"
      QDRANT_URL: "http://qdrant:6333"
      DATABASE_URL: "sqlite:////app/data/assistant.db"
    volumes:
      - app_data:/app/data
    depends_on:
      qdrant:
        condition: service_started
    command: >
      bash -c "python scripts/ingest_knowledge.py &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Optional Telegram bot. Enable with: docker compose --profile bot up
  bot:
    build: .
    profiles: ["bot"]
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      API_BASE_URL: "http://app:8000"
    depends_on:
      - app
    command: ["python", "-m", "bot.main"]

volumes:
  qdrant_storage:
  app_data:
