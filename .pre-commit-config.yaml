minimum_pre_commit_version: "3.7.1"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: local
    hooks:
      - id: docs-links
        name: validate bilingual documentation links
        entry: python3 scripts/check_docs_links.py
        language: system
        pass_filenames: false
        files: ^(README(\.ru)?\.md|docs/.*\.md)$
